name: kaos

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: kaos
      POSTGRES_PASSWORD: kaos
      POSTGRES_DB: kaos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaos -d kaos"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 3s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kaos
      MINIO_ROOT_PASSWORD: kaos12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Local LLM for offline, zero-cost dogfooding (OpenAI-compatible API at /v1).
  # After `docker compose up -d ollama`, pull a model:
  #   docker exec kaos-ollama-1 ollama pull llama3.2:3b
  # For NVIDIA GPU acceleration, uncomment the `deploy` block below.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: ["gpu"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
